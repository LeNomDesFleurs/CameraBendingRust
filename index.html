<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <title>WebGPU particle experimentation</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
            background: #000;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* canvas {
            width: 80%;
        } */

        #controller {
            position: absolute;
            background: white;
            opacity: 0.7;
            top: 2rem;
            right: 0.0rem;
            /* left: 0.1rem; */
            display: flex;
            flex-direction: column;
            padding: 1rem;
            border-radius: 1em;
        }




        #models-container {
            position: absolute;
            top: 0;
            width: auto;
            height: 30px;
            display: flex;
            background-color: rgb(0, 0, 0, 0);
        }
    </style>
</head>

<body>
    <div id="models-container"></div>
    <canvas id="imageCanvas" width="1000" , height="1000" oncontextmenu="return false"></canvas>
    <!-- <button>Settings</button> -->
    <div id="controller">
        <h3>File</h3>
        <input type="file" id="imageLoader" name="imageLoader" />
        <br>
        <button id="process">Process</button>
        <br>
        <button id="reset">Reset</button>
        <br>
        <button id="download">Download</button>

        <h3>Signal</h3>

        Color mode
        <label><input type="radio" name="color_mode" value="0" checked /> Composite</label>
        <label><input type="radio" name="color_mode" value="1" /> Interleaved</label>
        <label><input type="radio" name="color_mode" value="2" /> Bayer</label>
        Alpha mode
        <label><input type="radio" name="alpha_mode" value="0" checked /> Preserve</label>
        <label><input type="radio" name="alpha_mode" value="1" /> Delete</label>
        <label><input type="radio" name="alpha_mode" value="2" /> Interleave</label>
        Order mode
        <label><input type="radio" name="order_mode" value="0" checked /> Row</label>
        <label><input type="radio" name="order_mode" value="1" /> Column</label>
        <label><input type="radio" name="order_mode" value="2" /> Reversed Row</label>
        <label><input type="radio" name="order_mode" value="3" /> Reversed Col</label>

        Continous
        <label><input type="checkbox" id="continous" required /> <i>I agree</i></label>

        <h3>Filter</h3>
        Filter Cutoff
        <input type="range" id="filter_cutoff" min="0" max="25000" step="1" value="25000">
        Filter Resonance
        <input type="range" id="filter_resonance" min="0.01" max="100" step="0.01" value="0.7">
        Averager
        <input type="range" id="averager" min="0.01" max="1" step="0.01" value="0.0">


        <h3>Delay</h3>
        Delay Time
        <input type="range" id="delay" min="0" max="30" step="1" value="1">
        Feedback
        <input type="range" id="feedback" min="0" max="1" step="0.001" value="0">

        <h3>Reverb</h3>
        Reverb Time
        <input type="range" id="reverb_time" min="0" max="1" step="0.001" value="0.5">
        Reverb Dry/Wet
        <input type="range" id="reverb_dry_wet" min="0" max="1" step="0.01" value="0">
        Reverb Size
        <input type="range" id="reverb_size" min="0" max="2" step="0.01" value="1">

        <h3>Wavefolding</h3>
        wavefolder amount
        <input type="range" id="wavefolder_amount" min="0" max="1" step="0.01" value="0">
        wavefolder freq
        <input type="range" id="wavefolder_freq" min="1" max="50" step="1" value="10">
        bitwise
        <input type="range" id="bitwise" min="0" max="210" step="1" value="0">
    </div>
    <script type="module" src="main.js"></script>
    <!-- <script type="module" src="controller.js"></script> -->
</body>

</html>
